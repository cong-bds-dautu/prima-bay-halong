<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Khách Hàng - Prima Bay Halong</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); }
        .called-true { background-color: #10b981; }
        .called-false { background-color: #ef4444; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    
    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
        <div class="glass-panel rounded-3xl p-8 max-w-md w-full">
            <h2 class="text-3xl font-bold text-center mb-6">Đăng Nhập Admin</h2>
            <form id="login-form" class="space-y-4">
                <input type="text" id="login-username" placeholder="Username (congnt1605)" required class="w-full px-6 py-4 rounded-2xl bg-white/10 border border-white/20 focus:outline-none focus:border-sky-400 text-white">
                <input type="password" id="login-password" placeholder="Mật khẩu (Cn160520)" required class="w-full px-6 py-4 rounded-2xl bg-white/10 border border-white/20 focus:outline-none focus:border-sky-400 text-white">
                <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 text-white px-6 py-4 rounded-2xl font-bold transition">
                    Đăng Nhập
                </button>
            </form>
            <p id="login-error" class="text-red-400 text-center mt-4 hidden"></p>
        </div>
    </div>

    <!-- Header -->
    <div class="glass-panel sticky top-0 z-50 border-b border-white/10" id="admin-header" style="display:none;">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">📊 Prima Bay Halong - Admin</h1>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-full transition">
                Đăng Xuất
            </button>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 md:grid-cols-4 gap-6" id="stats-cards" style="display:none;">
        <div class="glass-panel p-6 rounded-3xl text-center">
            <div class="text-4xl font-bold text-sky-400" id="total-customers">0</div>
            <div class="text-sm text-slate-300 mt-2">Tổng khách hàng</div>
        </div>
        <div class="glass-panel p-6 rounded-3xl text-center">
            <div class="text-4xl font-bold text-green-400" id="called-customers">0</div>
            <div class="text-sm text-slate-300 mt-2">Đã gọi (✓)</div>
        </div>
        <div class="glass-panel p-6 rounded-3xl text-center">
            <div class="text-4xl font-bold text-red-400" id="pending-customers">0</div>
            <div class="text-sm text-slate-300 mt-2">Chưa gọi (⬜)</div>
        </div>
        <div class="glass-panel p-6 rounded-3xl text-center">
            <button onclick="loadCustomers()" class="text-sky-400 hover:text-sky-300 underline">
                ↻ Cập nhật dữ liệu
            </button>
        </div>
    </div>

    <!-- Customers Table -->
    <div class="max-w-7xl mx-auto px-6 pb-12" id="customers-container" style="display:none;">
        <div class="glass-panel rounded-3xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800/50">
                    <tr>
                        <th class="px-6 py-4 font-semibold text-slate-300">Thời gian</th>
                        <th class="px-6 py-4 font-semibold text-slate-300">Họ tên</th>
                        <th class="px-6 py-4 font-semibold text-slate-300">SĐT</th>
                        <th class="px-6 py-4 font-semibold text-slate-300">Email</th>
                        <th class="px-6 py-4 font-semibold text-slate-300">Ghi chú</th>
                        <th class="px-6 py-4 font-semibold text-slate-300">Trạng thái</th>
                        <th class="px-6 py-4 font-semibold text-slate-300">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="customers-table" class="divide-y divide-white/5">
                    <!-- Rows will be populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
